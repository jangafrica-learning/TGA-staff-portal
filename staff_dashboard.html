<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TGA Teacher's Portal</title>

    <!-- ALLOW ZOOM -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: #f4f6f8;
            overflow-x: hidden;
        }

        .wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* OVERLAY (MOBILE ONLY) */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            z-index: 9;
        }

        .overlay.active {
            display: block;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #023b5e;
            color: #fff;
            padding: 15px;
            position: fixed;
            top: 0;
            left: -260px;
            height: 100vh;
            transition: left 0.3s ease;
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .sidebar button {
            width: 100%;
            background: none;
            border: none;
            color: #fff;
            text-align: left;
            padding: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .sidebar button:hover {
            background: #f301ef;
        }

        .submenu {
            display: none;
            padding-left: 10px;
        }

        .submenu button {
            font-size: 14px;
            background: #02799d;
            margin-bottom: 4px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 15px 10px;
            font-size: 13px;
            text-align: center;
            opacity: 0.9;
        }

        /* MAIN */
        .main {
            flex: 1;
            width: 100%;
        }

        /* TOP BAR */
        .top-bar {
            height: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
            background: #f4f6f8;
        }

        .hamburger {
            background: #0b3d2e;
            color: #fff;
            border: none;
            width: 44px;
            height: 44px;
            font-size: 22px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* CENTER WELCOME */
        .center-welcome {
            min-height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .center-welcome h2 {
            font-size: clamp(22px, 4vw, 28px);
            color: #0b3d2e;
            margin-bottom: 12px;
        }

        .center-welcome p {
            max-width: 600px;
            line-height: 1.6;
            color: #444;
            font-size: clamp(14px, 2.5vw, 16px);
        }

        iframe {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
            background: #fff;
        }

        .back-btn {
            background: #0b3d2e;
            color: #fff;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
        }

        /* DESKTOP MODE */
        @media (min-width: 1024px) {
            .sidebar {
                left: 0;
                position: relative;
            }

            .overlay {
                display: none !important;
            }

            .hamburger {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay" onclick="closeMenu()"></div>

    <div class="wrapper">

        <!-- SIDEBAR-->
        <div class="sidebar" id="sidebar">
            <h2>Teacher's Portal</h2>


            <!-- SCHEDULES -->
            <button onclick="toggle('sched')">Schedules</button>
            <div class="submenu" id="sched">

                <button
                    onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vSBgmgpuW7AAmMUJr-flm0VSJIZ-4li-dKPO5Pu-EDTKgp-g69-h4auPBBpmroIJldCBWSYp0zAh_e8/pubhtml?widget=true&headers=false')">View Assembly Agenda</button>
                <button
                    onclick="loadFrame('https://docs.google.com/forms/d/e/1FAIpQLSfq5kYKgNGOb573WaQd9eVViq66_pwYKQLK0yzZdcvRcVdmuw/viewform?embedded=true')">Submit Assembly Agenda</button>                
                <button
                    onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vTJ1lZ1EfOxqgk2lsBtwHCZKsx7mVRq0XXC3ZlhEhcY2nizXw6Lh7kyE59vMawlW7bZ59GBcfipdIS4/pubhtml?widget=true&headers=false')">view Timetables</button>
                <button
                    onclick="loadFrame('https://drive.google.com/file/d/1R3Ff11X5JOuHYc_EvxoQrunUdpVik0AQ/preview')">View Term Dates (2025–2027)</button>
                <button
                    onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vQq0Wyx2dYpP4JJJkq5haVsu7H6pomnf5pJeP9lkQBF2mqTPdrRcopH13tP1ppYm1xgUMCJhRA2vDe_/pubhtml?widget=true&headers=false')">View After School Timetable</button>     
                <button
                    onclick="loadFrame('https://docs.google.com/forms/d/e/1FAIpQLSdZNcH_otHtKWOLgtWkbamVDxUIfB1vrkYkVxATDZ8E1XfYcQ/viewform?embedded=true')">Record After School Request</button>
                <button
                    onclick="loadFrame('https://drive.google.com/file/d/1whLFd5cCybREfVi0IKG7cBnqzHSAyKEZ/preview')">View Lunch Menu</button>

            </div>

            <!-- CURRICULUM -->
            <button onclick="toggle('curriculum')">Curriculum</button>
            <div class="submenu" id="curriculum">             
                <button
                    onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vS47HEydfMNrO6XFbZsm4fHlgHolA6mSPqm0sSG6YjeaD9y9gMXXsAYAisYsonmvot4PV1qFP9einpS/pubhtml?widget=true&headers=false')">View Curriculum Tracker</button>
                  <button
                    onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vSvZ1FQmLICmRl1RIqX-c63nCdXM2OyB270cxtcaxS6K2_M2qpA2b7OZJbBnUImBCy-T3eb7FY2kImu/pubhtml?widget=true&headers=false')">View Lesson Plans S1</button>                 
                 <button
                    onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vQMFKnrJR7eYWD8L2I6rHOWz6Se-oJtK6e_0XY2ulrpcGJ8wxLrq6K8p-TIF7CAwrNbUWp0QwKv7CpX/pubhtml?widget=true&amp;headers=false')">View Lesson Plans S2</button>              
                 <button
                    onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vTyET2Qtnf-GO9oSI6vLkFcfLOq8WS3aLA1Iqb9e3Xc2SJDTOVjUePsIB-XMsqYAivp9_6jRwXDOuRV/pubhtml?widget=true&amp;headers=false')">View Lesson Plans Jr</button>  
            </div>

            <!-- STUDENTS -->
            <button onclick="toggle('students')">Students & Classroom</button>
            <div class="submenu" id="students">
                <button
                    onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vQeeJZZpj8WrnSwpxHHTybmz2OOxMFx7Cesd2rzDBfiPV8Y5V8K7VuKW-WyiSP3wCVcaMYCteQXqGlb/pubhtml?widget=true&headers=false')">View Disciplinary Board</button>
                <button
                    onclick="loadFrame('https://docs.google.com/forms/d/e/1FAIpQLSdW82xzyviqfkduy-Lpm7KFR1cSbtMnPLMFm38BndUJACSs4w/viewform?embedded=true')">Record Disciplinary Case</button>                
                <button
                    onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vRSEoIblyrRp9ip8OVoJv5CPwf_rD3MGKTGGk4W-5fVZyfTtl8zV3qOALyJoYEMW6mV0W-W6-Rw8B8z/pubhtml?widget=true&headers=false')">View Routines Register</button>
                <button
                    onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vQs6dBKKQkZlCddOURh5pB7Rwruxs4s1SJ0N6AFGyaGcI9A4qb-SU2G9LTtbFBbaJ3QcDP5MnHC1a2E/pubhtml?widget=true&amp;headers=false')">View Team Point</button>
                <button
                    onclick="loadFrame('https://docs.google.com/forms/d/e/1FAIpQLSerb4DabLhPYNTDYLgzxe8Y_gKdgSd8NguPPwJibLRTYOXdjw/viewform?embedded=true')">Record Team Point</button>
                <button
                    onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vT_rQVu_-SuUWg46u0J799YKBl-7ZvqkMAVOoawNrrpllo_KOt8D64yYGkMXatycB1-snNZ1NPysdUg/pubhtml?widget=true&headers=false')">View Test Scores</button>
                <button 
                    onclick="window.location.href='https://jangafrica-learning.github.io/TGA-Student-Folders/index.html'">Open Students' Folders</button>
            </div>

            <!-- LOGOUT & FOOTERS -->
            <div class="sidebar-logout">
                <button onclick="logout()">Logout ⏻</button>
            </div>
            <div class="sidebar-footer">
                Powered by JangAfrica<br>
                © <span id="year"></span> The Gambia Academy
            </div>
        </div>

        <!-- MAIN -->
        <div class="main">
            <div class="top-bar">
                <button class="hamburger" onclick="openMenu()">☰</button>
            </div>

            <div id="content">
                <div class="center-welcome">
                    <h2>Welcome to The Gambia Academy Teacher's Portal</h2>
                    <h4>
                        This portal supports planning & reporting, accountability,
                        and operational excellence across The Academy.
                    </h4>
                    <p1>Use the sidebar menu to view schedules, curriculum, students & classroom.</p1>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");

        function openMenu() {
            sidebar.classList.add("active");
            overlay.classList.add("active");
        }

        function closeMenu() {
            sidebar.classList.remove("active");
            overlay.classList.remove("active");
        }

        function toggle(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function loadFrame(url) {
            closeMenu();
            document.getElementById('content').innerHTML = `
                <div class="top-bar">
                    <strong>The Gambia Academy SMS</strong>
                    <button class="back-btn" onclick="goBack()">CLOSE</button>
                </div>
                <iframe src="${url}"></iframe>
            `;
        }

        function goBack() {
            document.getElementById('content').innerHTML = `
                <div class="center-welcome">
                    <h2>Welcome Back</h2>
                    <p>Select an item from the sidebar menus to continue navigating the system.</p>
                </div>
            `;
        }

        document.getElementById("year").textContent = new Date().getFullYear();
        function logout() {
            // Optional: clear session storage later if you add login sessions
            // sessionStorage.clear();

            window.location.href = "index.html"; // your homepage
        }
    </script>

</body>


</html>
